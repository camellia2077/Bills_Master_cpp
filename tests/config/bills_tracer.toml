[paths]
workspace_dir = "../../dist/tests/runtime/bills_tracer/workspace"
bills_dir = "../../testdata/bills"
import_dir = "../../dist/tests/runtime/bills_tracer/runs/manual/cache/txt2json"

[runtime]
base_dir = "../../dist/tests/runtime/bills_tracer/runs/manual"
run_id = "manual"
output_dir = "../../dist/tests/artifact/bills_tracer/latest"
summary_path = "../../dist/tests/artifact/bills_tracer/latest/test_summary.json"

[run_control]
run_cleanup = true
run_prepare_env = true
run_tests = true

[settings]
run_export_all_tasks = true
ingest_mode = "stepwise"
ingest_write_json = false
export_pipeline = "model-first"
export_formats = ["md", "json", "tex", "rst"]
output_project = "bills_tracer"

[cleanup]
files_to_delete = []
dirs_to_delete = [
  "db",
  "cache",
  "exports",
  "logs",
  "record_templates",
  "config",
  "notices",
]

[test_dates]
single_year = "2025"
single_month = "2025-01"
range_start = "2025-03"
range_end = "2025-04"
