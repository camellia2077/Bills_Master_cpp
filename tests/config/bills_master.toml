[paths]
build_dir = "../../build/tests/runtime/bills_tracer/workspace"
bills_dir = "../fixtures/bills"
import_dir = "../../build/tests/runtime/bills_tracer/runs/manual/output/txt2josn"

[runtime]
base_dir = "../../build/tests/runtime/bills_tracer/runs/manual"
run_id = "manual"
output_dir = "../../build/tests/artifact/bills_tracer/latest"
summary_path = "../../build/tests/artifact/bills_tracer/latest/test_summary.json"

[run_control]
run_cleanup = true
run_prepare_env = true
run_tests = true

[settings]
run_export_all_tasks = true
ingest_mode = "stepwise"
ingest_write_json = false
export_pipeline = "model-first"
export_formats = ["md", "json", "tex", "rst"]
output_project = "bills_tracer"

[cleanup]
files_to_delete = ["bills.sqlite3"]
dirs_to_delete = [
  "output/bills_tracer",
  "output/txt2josn",
  "output/exported_files",
  "output/logs",
  "build",
  "config",
]

[test_dates]
single_year = "2025"
single_month = "2025-01"
range_start = "2025-03"
range_end = "2025-04"
