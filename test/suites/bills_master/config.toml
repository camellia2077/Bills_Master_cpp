# config.toml (新版本)

[paths]
# 项目产物 (exe, dll) 所在的目录
build_dir = '../../../apps/bills_windows_cli/build_fast/bin'
# 存放原始 .txt 账单文件的目录
bills_dir = '../../data/bills_output_from_config'
# 预处理后 .json 文件所在的目录
import_dir = '../../output/txt2josn'

# --- [核心修改]：流程控制开关 ---
# true or false
[run_control]
# 控制是否执行“清理”步骤
run_cleanup = true

# 控制是否执行“准备环境”步骤 (复制 exe, 插件, config)
run_prepare_env = true

# 控制是否执行所有“指令测试” (validate, import, query, export)
run_tests = true

[plugins]
# 需要复制的插件 DLL 名称
plugin_dlls = [
    "md_month_formatter.dll",
    "md_year_formatter.dll"
]

# --- 测试相关的具体设置 ---
[settings]
# (此开关仅在 run_tests = true 时生效)
# True  -> 运行“导出全部”任务
# False -> 运行“按日期导出”任务
run_export_all_tasks = true

# 插入流程选择: "ingest" 或 "stepwise"
ingest_mode = "stepwise"
# 仅对 ingest 生效，是否持久化 JSON
ingest_write_json = false
# 导出流水线: legacy | model-first | json-first
export_pipeline = "model-first"

# 需要测试的导出格式
export_formats = ['md']
output_project = 'bills_tracer'

[cleanup]
# 需要清理的文件
files_to_delete = ["bills.sqlite3"]
# 需要清理的目录
dirs_to_delete = ["output/bills_tracer", "output/txt2josn", "output/exported_files", "output/logs", "build", "plugins", "config"]

[test_dates]
# 用于专项日期导出测试的日期配置
single_year = "2021"
single_month = "2022-01"
range_start = "2024-03"
range_end = "2024-04"
