schema_version = 1

[pipeline]
name = "log_generator_cli"
description = "Prepare log_generator dist and run full CLI command tests."
default_timeout_seconds = 1800

[output]
root = "dist/tests/logic/pipeline_runner/log_generator_cli"

[env]
PYTHONUNBUFFERED = "1"

[[steps]]
id = "dist"
name = "Prepare log_generator debug dist"
command = ["{python}", "tools/flows/log_generator_flow.py", "dist", "--preset", "debug"]
cwd = "{repo_root}"
timeout_seconds = 1800
retries = 0
depends_on = []
artifacts = [
  "dist/cmake/log_generator/debug/shared/bin/generator.exe",
  "dist/cmake/log_generator/debug/shared/bin/config/config.toml",
]

[[steps]]
id = "cli_test"
name = "Run log_generator CLI tests"
command = [
  "{python}",
  "tests/suites/logic/log_generator_cli/run_tests.py",
  "--generator",
  "dist/cmake/log_generator/debug/shared/bin/generator.exe",
  "--config",
  "dist/cmake/log_generator/debug/shared/bin/config/config.toml",
]
cwd = "{repo_root}"
timeout_seconds = 1200
retries = 0
depends_on = ["dist"]
artifacts = [
  "dist/tests/logic/log_generator_cli/test_summary.json",
]


