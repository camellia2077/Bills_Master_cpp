schema_version = 1

[pipeline]
name = "log_generator_cli"
description = "Build log_generator and run full CLI command tests."
default_timeout_seconds = 1800

[output]
root = "build/tests/logic/pipeline_runner/log_generator_cli"

[env]
PYTHONUNBUFFERED = "1"

[[steps]]
id = "build"
name = "Build log_generator debug"
command = ["{python}", "tools/flows/log_generator_flow.py", "build", "--preset", "debug"]
cwd = "{repo_root}"
timeout_seconds = 1800
retries = 0
depends_on = []
artifacts = [
  "build/log_generator/debug/shared/bin/generator.exe",
  "build/log_generator/debug/shared/bin/config/config.toml",
]

[[steps]]
id = "cli_test"
name = "Run log_generator CLI tests"
command = [
  "{python}",
  "tests/suites/logic/log_generator_cli/run_tests.py",
  "--generator",
  "build/log_generator/debug/shared/bin/generator.exe",
  "--config",
  "build/log_generator/debug/shared/bin/config/config.toml",
]
cwd = "{repo_root}"
timeout_seconds = 1200
retries = 0
depends_on = ["build"]
artifacts = [
  "build/tests/logic/log_generator_cli/test_summary.json",
]
