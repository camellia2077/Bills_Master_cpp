schema_version = 1

[pipeline]
name = "bills_artifact"
description = "Prepare bills_cli dist and run artifact CLI tests."
default_timeout_seconds = 3600

[output]
root = "dist/tests/logic/pipeline_runner/bills_artifact"

[env]
PYTHONUNBUFFERED = "1"

[[steps]]
id = "build_and_test"
name = "Prepare dist and run bills artifact tests"
command = ["{python}", "tools/flows/bills_tracer_flow.py", "--formats", "md,json,tex,rst,typ"]
cwd = "{repo_root}"
timeout_seconds = 3600
retries = 0
depends_on = []
artifacts = [
  "dist/tests/artifact/bills_tracer/latest/test_summary.json",
  "dist/tests/artifact/bills_tracer/latest/test_python_output.log",
]

[[steps]]
id = "validate_summary"
name = "Validate artifact summary json exists and passes"
command = [
  "{python}",
  "-c",
  "import json,pathlib,sys; p=pathlib.Path(r'dist/tests/artifact/bills_tracer/latest/test_summary.json'); d=json.loads(p.read_text(encoding='utf-8')); sys.exit(0 if d.get('ok') else 1)",
]
cwd = "{repo_root}"
timeout_seconds = 300
retries = 0
depends_on = ["build_and_test"]
artifacts = [
  "dist/tests/artifact/bills_tracer/latest/test_summary.json",
]

