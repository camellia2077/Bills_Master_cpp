schema_version = 1

[pipeline]
name = "log_generator_generate_promote"
description = "Prepare+generate to artifact, then explicitly promote to testdata."
default_timeout_seconds = 1800

[output]
root = "dist/tests/logic/pipeline_runner/log_generator_generate_promote"

[env]
PYTHONUNBUFFERED = "1"

[[steps]]
id = "dist"
name = "Prepare log_generator debug dist"
command = ["{python}", "tools/run.py", "log-generator", "dist", "--preset", "debug"]
cwd = "{repo_root}"
timeout_seconds = 1800
retries = 0
depends_on = []
artifacts = [
  "dist/cmake/log_generator/debug/shared/bin/generator.exe",
]

[[steps]]
id = "generate"
name = "Generate dataset to artifact"
command = [
  "{python}",
  "tools/run.py",
  "log-generator",
  "generate",
  "--preset",
  "debug",
  "--skip-dist",
  "--start-year",
  "2024",
  "--end-year",
  "2024",
]
cwd = "{repo_root}"
timeout_seconds = 600
retries = 0
depends_on = ["dist"]
artifacts = [
  "dist/tests/artifact/log_generator/latest/bills_output_from_config",
  "dist/tests/artifact/log_generator/latest_run.txt",
]

[[steps]]
id = "promote_testdata"
name = "Promote artifact dataset to testdata (explicit)"
command = ["{python}", "tools/run.py", "log-generator", "promote-testdata"]
cwd = "{repo_root}"
timeout_seconds = 300
retries = 0
depends_on = ["generate"]
artifacts = [
  "testdata/bills",
  "dist/tests/artifact/log_generator/last_promote.json",
]



