schema_version = 1

[pipeline]
name = "log_generator_generate_promote"
description = "Build+generate to artifact, then explicitly promote to fixtures."
default_timeout_seconds = 1800

[output]
root = "tests/output/logic/pipeline_runner/log_generator_generate_promote"

[env]
PYTHONUNBUFFERED = "1"

[[steps]]
id = "build"
name = "Build log_generator debug"
command = ["{python}", "tools/flows/log_generator_flow.py", "build", "--mode", "Debug"]
cwd = "{repo_root}"
timeout_seconds = 1800
retries = 0
depends_on = []
artifacts = [
  "tests/generators/log_generator/build_debug/bin/generator.exe",
]

[[steps]]
id = "generate"
name = "Generate dataset to artifact"
command = [
  "{python}",
  "tools/flows/log_generator_flow.py",
  "generate",
  "--mode",
  "Debug",
  "--skip-build",
  "--start-year",
  "2024",
  "--end-year",
  "2024",
]
cwd = "{repo_root}"
timeout_seconds = 600
retries = 0
depends_on = ["build"]
artifacts = [
  "tests/output/artifact/log_generator/bills_output_from_config",
  "tests/output/artifact/log_generator/latest_run.txt",
]

[[steps]]
id = "promote_fixtures"
name = "Promote artifact dataset to fixtures (explicit)"
command = ["{python}", "tools/flows/log_generator_flow.py", "promote-fixtures"]
cwd = "{repo_root}"
timeout_seconds = 300
retries = 0
depends_on = ["generate"]
artifacts = [
  "tests/fixtures/bills",
  "tests/output/artifact/log_generator/last_promote.json",
]
