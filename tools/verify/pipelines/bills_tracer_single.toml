schema_version = 1

[pipeline]
name = "bills_tracer_single"
description = "Prepare dist, sync runtime, and run tests for bills_tracer."
default_timeout_seconds = 7200

[output]
root = "dist/tests/logic/pipeline_runner/bills_tracer_single"

[env]
PYTHONUNBUFFERED = "1"

[[steps]]
id = "run_bills_tracer"
name = "Run bills_tracer default workflow"
command = ["{python}", "tools/flows/bills_tracer_flow.py", "--formats", "md,json,tex,rst,typ"]
cwd = "{repo_root}"
timeout_seconds = 7200
retries = 0
depends_on = []
artifacts = [
  "dist/tests/artifact/bills_tracer/latest/test_summary.json",
  "dist/tests/artifact/bills_tracer/latest/test_python_output.log",
]

