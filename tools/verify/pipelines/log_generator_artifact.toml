schema_version = 1

[pipeline]
name = "log_generator_artifact"
description = "Prepare log_generator dist and generate dataset into artifact."
default_timeout_seconds = 1800

[output]
root = "dist/tests/logic/pipeline_runner/log_generator_artifact"

[env]
PYTHONUNBUFFERED = "1"

[[steps]]
id = "dist"
name = "Prepare log_generator debug dist"
command = ["{python}", "tools/flows/log_generator_flow.py", "dist", "--preset", "debug"]
cwd = "{repo_root}"
timeout_seconds = 1800
retries = 0
depends_on = []
artifacts = [
  "dist/cmake/log_generator/debug/shared/bin/generator.exe",
]

[[steps]]
id = "generate"
name = "Generate dataset to artifact"
command = [
  "{python}",
  "tools/flows/log_generator_flow.py",
  "generate",
  "--preset",
  "debug",
  "--skip-dist",
  "--start-year",
  "2024",
  "--end-year",
  "2024",
]
cwd = "{repo_root}"
timeout_seconds = 600
retries = 0
depends_on = ["dist"]
artifacts = [
  "dist/tests/artifact/log_generator/latest/bills_output_from_config",
  "dist/tests/artifact/log_generator/latest_run.txt",
]


