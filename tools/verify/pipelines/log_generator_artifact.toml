schema_version = 1

[pipeline]
name = "log_generator_artifact"
description = "Build log_generator and generate dataset into artifact."
default_timeout_seconds = 1800

[output]
root = "build/tests/logic/pipeline_runner/log_generator_artifact"

[env]
PYTHONUNBUFFERED = "1"

[[steps]]
id = "build"
name = "Build log_generator debug"
command = ["{python}", "tools/flows/log_generator_flow.py", "build", "--preset", "debug"]
cwd = "{repo_root}"
timeout_seconds = 1800
retries = 0
depends_on = []
artifacts = [
  "build/log_generator/debug/shared/bin/generator.exe",
]

[[steps]]
id = "generate"
name = "Generate dataset to artifact"
command = [
  "{python}",
  "tools/flows/log_generator_flow.py",
  "generate",
  "--preset",
  "debug",
  "--skip-build",
  "--start-year",
  "2024",
  "--end-year",
  "2024",
]
cwd = "{repo_root}"
timeout_seconds = 600
retries = 0
depends_on = ["build"]
artifacts = [
  "build/tests/artifact/log_generator/latest/bills_output_from_config",
  "build/tests/artifact/log_generator/latest_run.txt",
]
